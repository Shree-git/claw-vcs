name: Cross-Version Runtime

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-version-runtime-integration:
    name: Cross-Version Runtime Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run cross-version runtime integration tests
        shell: bash
        run: |
          set -o pipefail
          cargo test -p claw-integration-tests --test cross_version_runtime_tests --locked 2>&1 | tee cross-version-runtime-test.log

      - name: Upload cross-version runtime test log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cross-version-runtime-test-log
          path: cross-version-runtime-test.log
          if-no-files-found: ignore
