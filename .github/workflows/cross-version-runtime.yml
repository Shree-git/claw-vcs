name: Cross-Version Runtime

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-version-runtime-integration:
    name: Cross-Version Runtime Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run cross-version runtime integration tests
        shell: bash
        run: |
          set -o pipefail
          cargo test -p claw-integration-tests --test cross_version_runtime_tests --locked 2>&1 | tee cross-version-runtime-test.log

      - name: Upload cross-version runtime test log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cross-version-runtime-test-log
          path: cross-version-runtime-test.log
          if-no-files-found: ignore
