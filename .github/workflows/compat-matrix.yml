name: Compatibility Matrix

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace --all-targets

      - name: Runtime and daemon contract targets (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo test -p claw-integration-tests --test daemon_http_contract_tests
          cargo test -p claw-integration-tests --test cross_version_runtime_tests
