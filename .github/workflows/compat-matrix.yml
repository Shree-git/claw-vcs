name: Compatibility Matrix

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cargo check
        run: cargo check --workspace --all-targets --locked

      - name: Cargo test
        run: cargo test --workspace --all-targets --exclude claw-integration-tests --locked

      - name: Core CLI smoke suites
        run: |
          cargo test -p claw-integration-tests --test cli_admin_git_workflow_tests --locked
          cargo test -p claw-integration-tests --test cli_core_workflow_tests --locked
          cargo test -p claw-integration-tests --test cli_error_contract_tests --locked
          cargo test -p claw-integration-tests --test vector_manifest_tests --locked

      - name: Live daemon and sync suites (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo test -p claw-integration-tests --test cli_sync_e2e_tests --locked
          cargo test -p claw-integration-tests --test daemon_http_contract_tests --locked
          cargo test -p claw-integration-tests --test cross_version_runtime_tests --locked

      - name: Extended live sync smoke (macOS main)
        if: matrix.os == 'macos-latest' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo test -p claw-integration-tests --test cli_sync_e2e_tests --locked
