name: Nightly Chaos

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-chaos-drills:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CHAOS_MODE: deterministic
      RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run deterministic chaos suite
        run: cargo test -p claw-integration-tests --test chaos_tests --locked -- --test-threads=1

      - name: Run deterministic mutating sync stress subset
        run: cargo test -p claw-integration-tests --test load_soak_tests --locked -- --test-threads=1

      - name: Run live compatibility drill
        run: cargo test -p claw-integration-tests --test cross_version_runtime_tests --locked -- --test-threads=1
