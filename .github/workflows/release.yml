# SPDX-License-Identifier: MIT or Apache-2.0
#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "read"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  quality:
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Verify generated protobuf output
        run: scripts/verify-generated-protos.sh
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Production panic audit
        run: cargo clippy --workspace --lib --bins --locked -- -D clippy::panic -D clippy::todo -D clippy::unimplemented
      - name: Unsafe code audit
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIn --include='*.rs' --exclude-dir=generated 'unsafe' crates tests; then
            echo "unsafe Rust requires an explicit audit entry before release" >&2
            exit 1
          fi
      - name: Tests
        run: cargo test --workspace --all-targets --locked
      - name: Example workflow smoke scripts
        run: |
          cargo build -p claw-vcs --locked
          CLAW_BIN=target/debug/claw examples/basic-demo/scripts/demo.sh
          CLAW_BIN=target/debug/claw examples/agent-capsule/scripts/demo.sh
          CLAW_BIN=target/debug/claw examples/policy-gated-integration/scripts/failure-cases.sh
          CLAW_BIN=target/debug/claw examples/backup-restore/scripts/demo.sh
      - name: Build rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked
      - name: Compile fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml --bins --locked
      - name: Smoke fuzz targets
        shell: bash
        run: |
          set -euo pipefail
          for target in \
            core_cof_decode \
            cof_decode \
            patch_codecs \
            patch_apply \
            json_tree_merge \
            policy_checks \
            crypto_capsule \
            store_objects \
            object_id_parse \
            git_import_parse \
            sync_chunk_decode; do
            cargo run --manifest-path fuzz/Cargo.toml --bin "$target" --locked -- -runs=1
          done

  # Run 'dist plan' to determine what tasks we need to do
  plan:
    permissions:
      contents: read
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        run: cargo install cargo-dist --version 0.30.3 --locked
      - name: Cache dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        env:
          DIST_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "pull_request" && -n "$DIST_RELEASE_TAG" ]]; then
            dist plan --tag="$DIST_RELEASE_TAG" --output-format=json > plan-dist-manifest.json
          else
            dist plan --output-format=json > plan-dist-manifest.json
          fi
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
      - quality
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Validate dist matrix inputs
        shell: bash
        env:
          DIST_CONTAINER_IMAGE: ${{ matrix.container && matrix.container.image || '' }}
          DIST_INSTALL_RUN: ${{ matrix.install_dist.run }}
          DIST_PACKAGES_INSTALL: ${{ matrix.packages_install }}
        run: |
          set -euo pipefail

          if [[ -n "$DIST_CONTAINER_IMAGE" ]]; then
            case "$DIST_CONTAINER_IMAGE" in
              ghcr.io/axodotdev/*|messense/rust-musl-cross:*|quay.io/pypa/manylinux*|ubuntu:*|debian:*|fedora:*|centos:*)
                ;;
              *)
                echo "Unapproved dist container image: $DIST_CONTAINER_IMAGE" >&2
                exit 1
                ;;
            esac
            if [[ "$DIST_CONTAINER_IMAGE" != *@sha256:* ]]; then
              echo "::warning::dist container image is allowlisted but not digest-pinned: $DIST_CONTAINER_IMAGE"
            fi
          fi

          validate_dist_command_lines() {
            local label="$1"
            local value="$2"
            while IFS= read -r line; do
              line="${line#"${line%%[![:space:]]*}"}"
              line="${line%"${line##*[![:space:]]}"}"
              [[ -z "$line" || "$line" == \#* ]] && continue
              case "$line" in
                "cargo install cargo-dist --version 0.30.3 --locked"*|\
                "rustup target add "*|\
                "sudo apt-get update"*|\
                "sudo apt-get install "*|\
                "brew install "*|\
                "choco install "*|\
                "pwsh "*|\
                "powershell "*|\
                "true"|":")
                  ;;
                *)
                  echo "Unapproved generated dist command in $label: $line" >&2
                  exit 1
                  ;;
              esac
            done <<< "$value"
          }

          validate_dist_command_lines "matrix.install_dist.run" "$DIST_INSTALL_RUN"
          validate_dist_command_lines "matrix.packages_install" "$DIST_PACKAGES_INSTALL"
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - quality
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  security-audit-gate:
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    needs:
      - plan
      - quality
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.6 --locked
      - name: Run cargo-deny
        run: cargo deny check
      - name: Install cargo-vet
        run: cargo install cargo-vet --version 0.10.2 --locked
      - name: Run cargo-vet
        run: cargo vet

  contract-tests-gate:
    if: ${{ needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    needs:
      - plan
      - quality
      - build-local-artifacts
      - build-global-artifacts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Fetch ops artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Run contract tests
        run: |
          cargo test -p claw-vcs --locked -- --nocapture
          cargo test -p claw-integration-tests --test spec_tests --locked
          cargo test -p claw-integration-tests --test ops_artifacts_tests --locked
          cargo test -p claw-integration-tests --test vector_manifest_tests --locked
          cargo test -p claw-integration-tests --test chaos_tests --locked -- --test-threads=1

  artifact-smoke-gate:
    if: ${{ needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    needs:
      - plan
      - quality
      - build-local-artifacts
      - build-global-artifacts
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest
    name: artifact-smoke-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Fetch built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Smoke release archives
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.os }}" in
            ubuntu-22.04)
              archive="$(find target/distrib -maxdepth 1 -type f -name 'claw-x86_64-unknown-linux-gnu.tar.xz' | head -n 1)"
              ;;
            macos-latest)
              case "$(uname -m)" in
                arm64) pattern='claw-aarch64-apple-darwin.tar.xz' ;;
                x86_64) pattern='claw-x86_64-apple-darwin.tar.xz' ;;
                *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
              esac
              archive="$(find target/distrib -maxdepth 1 -type f -name "$pattern" | head -n 1)"
              ;;
          esac

          test -n "$archive"
          mkdir -p smoke-archive
          tar -xJf "$archive" -C smoke-archive
          binary="$(find smoke-archive -type f -name claw | head -n 1)"
          test -n "$binary"
          "$binary" --version

          mkdir -p smoke-archive/repo
          (
            cd smoke-archive/repo
            "$binary" init
            "$binary" status
          )

          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            (
              cd smoke-archive/repo
              "$binary" daemon --listen 127.0.0.1:50061 --health-listen 127.0.0.1:50062 --auth-token smoke-token >/tmp/claw-artifact-daemon.log 2>&1 &
              daemon_pid=$!
              trap 'kill "$daemon_pid" >/dev/null 2>&1 || true' EXIT
              for _ in $(seq 1 20); do
                if curl -fsS http://127.0.0.1:50062/v1/health/live >/tmp/claw-artifact-health.json; then
                  break
                fi
                sleep 1
              done
              grep -q '"code":"ok"' /tmp/claw-artifact-health.json
              kill "$daemon_pid"
              wait "$daemon_pid" || true
              trap - EXIT
            )
          fi

      - name: Smoke Windows release archive
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $zip = Get-ChildItem -Path target/distrib -Filter "claw-x86_64-pc-windows-msvc.zip" -File | Select-Object -First 1
          if (-not $zip) {
            throw "missing Windows release zip"
          }

          $msi = Get-ChildItem -Path target/distrib -Filter "claw-x86_64-pc-windows-msvc.msi" -File | Select-Object -First 1
          if (-not $msi) {
            throw "missing Windows MSI"
          }

          New-Item -ItemType Directory -Force -Path smoke-archive | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath smoke-archive -Force
          $binary = Get-ChildItem -Path smoke-archive -Filter "claw.exe" -Recurse -File | Select-Object -First 1
          if (-not $binary) {
            throw "missing claw.exe in Windows release zip"
          }

          & $binary.FullName --version
          New-Item -ItemType Directory -Force -Path smoke-archive\repo | Out-Null
          Push-Location smoke-archive\repo
          try {
            & $binary.FullName init
            & $binary.FullName status
          } finally {
            Pop-Location
          }

  compatibility-matrix-gate:
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    needs:
      - plan
      - quality
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest
    name: compatibility-matrix-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cargo check
        run: cargo check --workspace --all-targets --locked
      - name: Cargo test
        run: cargo test --workspace --all-targets --locked --exclude claw-integration-tests
      - name: Core CLI smoke suites
        run: |
          cargo test -p claw-integration-tests --test cli_admin_git_workflow_tests --locked
          cargo test -p claw-integration-tests --test cli_core_workflow_tests --locked
          cargo test -p claw-integration-tests --test cli_error_contract_tests --locked
          cargo test -p claw-integration-tests --test vector_manifest_tests --locked
          cargo test -p claw-integration-tests --test chaos_tests --locked -- --test-threads=1
  # Determines if we should publish/announce
  host:
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs:
      - quality
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - security-audit-gate
      - contract-tests-gate
      - artifact-smoke-gate
      - compatibility-matrix-gate
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.quality.result == 'success' && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') && needs.security-audit-gate.result == 'success' && needs.contract-tests-gate.result == 'success' && needs.artifact-smoke-gate.result == 'success' && needs.compatibility-matrix-gate.result == 'success' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=create --steps=upload --output-format=json > dist-manifest.json
          echo "artifacts uploaded successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Export release SBOM
        env:
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          gh api "/repos/${GH_REPO}/dependency-graph/sbom" \
            --jq '.sbom' \
            > "artifacts/claw-${RELEASE_TAG}.sbom.spdx.json"
          jq -e '
            .spdxVersion
            and (.SPDXID == "SPDXRef-DOCUMENT")
            and (.packages | type == "array")
            and (.packages | length > 0)
          ' "artifacts/claw-${RELEASE_TAG}.sbom.spdx.json" >/dev/null
          (
            cd artifacts
            sha256sum "claw-${RELEASE_TAG}.sbom.spdx.json" >> sha256.sum
          )
      - name: Write release metadata
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail

          cargo metadata --format-version=1 --locked > "$RUNNER_TEMP/cargo-metadata.json"
          declared_features="$(
            jq -c '.packages[] | select(.name == "claw-vcs") | .features' "$RUNNER_TEMP/cargo-metadata.json"
          )"
          workspace_members="$(jq -c '.workspace_members' "$RUNNER_TEMP/cargo-metadata.json")"
          rustc_verbose="$(rustc -vV)"
          host_triple="$(printf '%s\n' "$rustc_verbose" | awk -F': ' '$1 == "host" { print $2 }')"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"

          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$GITHUB_SHA" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg workflowRef "$GITHUB_WORKFLOW_REF" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg runUrl "$run_url" \
            --arg runnerOs "$RUNNER_OS" \
            --arg runnerArch "$RUNNER_ARCH" \
            --arg runnerName "$RUNNER_NAME" \
            --arg runnerImage "${ImageOS:-}" \
            --arg rustcVersion "$(rustc --version)" \
            --arg cargoVersion "$(cargo --version)" \
            --arg hostTriple "$host_triple" \
            --arg buildCommand "dist build ${{ needs.plan.outputs.tag-flag }}" \
            --argjson declaredFeatures "$declared_features" \
            --argjson workspaceMembers "$workspace_members" \
            '{
              schemaVersion: 1,
              repository: $repository,
              tag: $tag,
              commit: $commit,
              workflow: $workflow,
              workflowRef: $workflowRef,
              run: {
                id: $runId,
                attempt: $runAttempt,
                url: $runUrl
              },
              runner: {
                os: $runnerOs,
                arch: $runnerArch,
                name: $runnerName,
                image: $runnerImage
              },
              toolchain: {
                rustc: $rustcVersion,
                cargo: $cargoVersion,
                hostTriple: $hostTriple
              },
              build: {
                command: $buildCommand,
                defaultFeatures: true,
                explicitFeatures: [],
                declaredFeatures: $declaredFeatures,
                workspaceMembers: $workspaceMembers
              }
            }' > "artifacts/claw-${RELEASE_TAG}.release-metadata.json"

          jq -e '
            .schemaVersion == 1
            and (.repository | type == "string")
            and (.tag | type == "string")
            and (.commit | type == "string")
            and (.toolchain.rustc | startswith("rustc "))
            and (.toolchain.cargo | startswith("cargo "))
            and (.build.defaultFeatures == true)
          ' "artifacts/claw-${RELEASE_TAG}.release-metadata.json" >/dev/null
          (
            cd artifacts
            sha256sum "claw-${RELEASE_TAG}.release-metadata.json" >> sha256.sum
          )
      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/*
      - name: Attest release SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: artifacts/*
          sbom-path: artifacts/claw-${{ needs.plan.outputs.tag }}.sbom.spdx.json
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t artifacts_to_sign < <(
            find artifacts -type f \
              ! -name '*.sig' \
              ! -name '*.pem' \
              | sort
          )

          if [[ ${#artifacts_to_sign[@]} -eq 0 ]]; then
            echo "No release artifacts found to sign" >&2
            exit 1
          fi

          for artifact in "${artifacts_to_sign[@]}"; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done
      - name: Verify signed artifacts before release upload
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -f artifacts/sha256.sum ]]; then
            (cd artifacts && sha256sum -c sha256.sum --ignore-missing)
          fi

          mapfile -t artifacts_to_verify < <(
            find artifacts -type f \
              ! -name '*.sig' \
              ! -name '*.pem' \
              | sort
          )

          if [[ ${#artifacts_to_verify[@]} -eq 0 ]]; then
            echo "No release artifacts found to verify" >&2
            exit 1
          fi

          for artifact in "${artifacts_to_verify[@]}"; do
            cosign verify-blob \
              --signature "${artifact}.sig" \
              --certificate "${artifact}.pem" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release\\.yml@refs/tags/${RELEASE_TAG}$" \
              "$artifact"
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY" \
              --source-ref "refs/tags/${RELEASE_TAG}" \
              --source-digest "$GITHUB_SHA" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --predicate-type "https://slsa.dev/provenance/v1" \
              --deny-self-hosted-runners
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY" \
              --source-ref "refs/tags/${RELEASE_TAG}" \
              --source-digest "$GITHUB_SHA" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --predicate-type "https://spdx.dev/Document/v2.3" \
              --deny-self-hosted-runners
          done
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          set -euo pipefail

          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > "$RUNNER_TEMP/notes.txt"

          if gh release view "${{ needs.plan.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ needs.plan.outputs.tag }}" --clobber artifacts/*
            gh release edit "${{ needs.plan.outputs.tag }}" --draft=false --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt"
          else
            gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*
          fi

  publish-homebrew-formula:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: "shree-git/homebrew-tap"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # So we have access to the formula
      - name: Fetch homebrew formulae
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true
      # This is extra complex because you can make your Formula name not match your app name
      # so we need to find releases with a *.rb file, and publish with that filename.
      - name: Commit formula files
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            # We avoid reformatting user-provided data such as the app description and homepage.
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            git add "Formula/${filename}"
            if git diff --cached --quiet -- "Formula/${filename}"; then
              echo "No Homebrew formula changes for ${filename}; skipping commit."
              continue
            fi

            git commit -m "${name} ${version}"
          done
          auth_header="$(printf 'x-access-token:%s' "$HOMEBREW_TAP_TOKEN" | base64 -w 0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" push

  announce:
    needs:
      - plan
      - host
      - publish-homebrew-formula
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && (needs.publish-homebrew-formula.result == 'skipped' || needs.publish-homebrew-formula.result == 'success') }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
