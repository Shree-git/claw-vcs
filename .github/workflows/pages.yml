name: Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    if: github.repository == 'Shree-git/claw-vcs' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate landing page artifact
        run: |
          test -f docs/index.html
          grep -q '<title>Claw VCS' docs/index.html
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []

              def handle_starttag(self, tag, attrs):
                  if tag == "a":
                      for key, value in attrs:
                          if key == "href" and value:
                              self.hrefs.append(value)

          parser = LinkParser()
          parser.feed(Path("docs/index.html").read_text())
          relative_markdown = [
              href
              for href in parser.hrefs
              if href.endswith(".md") and "://" not in href and not href.startswith("#")
          ]
          if relative_markdown:
              raise SystemExit(
                  "relative Markdown links are not rendered by the static Pages artifact: "
                  + ", ".join(relative_markdown)
              )
          PY

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
