name: Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    if: github.repository == 'Shree-git/claw-vcs' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Validate landing page artifact
        run: |
          test -f docs/index.html
          grep -q '<title>Claw VCS' docs/index.html
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []

              def handle_starttag(self, tag, attrs):
                  if tag == "a":
                      for key, value in attrs:
                          if key == "href" and value:
                              self.hrefs.append(value)

          parser = LinkParser()
          parser.feed(Path("docs/index.html").read_text())
          relative_markdown = [
              href
              for href in parser.hrefs
              if href.endswith(".md") and "://" not in href and not href.startswith("#")
          ]
          if relative_markdown:
              raise SystemExit(
                  "relative Markdown links are not rendered by the static Pages artifact: "
                  + ", ".join(relative_markdown)
              )
          PY

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
