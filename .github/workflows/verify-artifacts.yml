name: Verify Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      artifact_path:
        description: "Path to artifact file or directory to verify"
        required: false
        type: string
      release_tag:
        description: "Release tag to download artifacts from when artifact_path is not set"
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Resolve artifact source
        id: source
        env:
          INPUT_ARTIFACT_PATH: ${{ github.event.inputs.artifact_path }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_ARTIFACT_PATH:-}" ]]; then
            if [[ ! -e "${INPUT_ARTIFACT_PATH}" ]]; then
              echo "ERROR: artifact_path does not exist: ${INPUT_ARTIFACT_PATH}" >&2
              exit 1
            fi
            echo "artifact_root=${INPUT_ARTIFACT_PATH}" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag="${INPUT_RELEASE_TAG:-}"
          if [[ -z "$release_tag" && "$REF_TYPE" == "tag" ]]; then
            release_tag="$REF_NAME"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "ERROR: release_tag is required when artifact_path is not provided and workflow is not running on a tag." >&2
            exit 1
          fi

          mkdir -p artifacts
          echo "artifact_root=artifacts" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        if: ${{ steps.source.outputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release download "$RELEASE_TAG" --dir artifacts

      - name: Verify signatures and certificates
        env:
          ARTIFACT_ROOT: ${{ steps.source.outputs.artifact_root }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -e "$ARTIFACT_ROOT" ]]; then
            echo "ERROR: artifact root does not exist: $ARTIFACT_ROOT" >&2
            exit 1
          fi

          is_manifest_metadata() {
            local path base
            path="$1"
            base="$(basename "$path")"
            shopt -s nocasematch
            if [[ "$base" =~ ^manifest([._-].+)?\.(json|ya?ml)$ ]] || [[ "$base" =~ ^.+\.manifest\.(json|ya?ml)$ ]] || [[ "$base" =~ ^metadata\.(json|ya?ml)$ ]]; then
              shopt -u nocasematch
              return 0
            fi
            shopt -u nocasematch
            return 1
          }

          mapfile -t artifacts < <(
            if [[ -f "$ARTIFACT_ROOT" ]]; then
              if is_manifest_metadata "$ARTIFACT_ROOT"; then
                exit 0
              fi
              printf '%s\n' "$ARTIFACT_ROOT"
            else
              find "$ARTIFACT_ROOT" -type f \
                ! -name '*.sig' \
                ! -name '*.pem' \
                ! -name '*.crt' \
                ! -name '*.cert' \
                ! -name '*.certificate' \
              | while IFS= read -r file; do
                  if ! is_manifest_metadata "$file"; then
                    printf '%s\n' "$file"
                  fi
                done
            fi
          )

          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "ERROR: no artifact files found to verify in $ARTIFACT_ROOT after excluding signature/certificate sidecars and manifest metadata" >&2
            exit 1
          fi

          missing_pair_count=0
          declare -a missing_pair_messages=()

          for artifact in "${artifacts[@]}"; do
            sig_file="${artifact}.sig"

            cert_file=""
            for candidate in "${artifact}.pem" "${artifact}.crt" "${artifact}.cert" "${artifact}.certificate"; do
              if [[ -f "$candidate" ]]; then
                cert_file="$candidate"
                break
              fi
            done

            if [[ ! -f "$sig_file" || -z "$cert_file" ]]; then
              ((missing_pair_count+=1))
              missing_detail="- ${artifact}"
              if [[ ! -f "$sig_file" ]]; then
                missing_detail+=" | missing signature: ${sig_file}"
              fi
              if [[ -z "$cert_file" ]]; then
                missing_detail+=" | missing certificate: expected one of ${artifact}.pem, ${artifact}.crt, ${artifact}.cert, ${artifact}.certificate"
              fi
              missing_pair_messages+=("$missing_detail")
            fi
          done

          if [[ $missing_pair_count -gt 0 ]]; then
            echo "ERROR: missing required signature/certificate pairs for ${missing_pair_count} artifact(s):" >&2
            printf '%s\n' "${missing_pair_messages[@]}" >&2
            echo "Each artifact to verify must have both <artifact>.sig and one certificate sidecar (.pem/.crt/.cert/.certificate)." >&2
            exit 1
          fi

          verified_count=0

          for artifact in "${artifacts[@]}"; do
            sig_file="${artifact}.sig"
            cert_file=""
            for candidate in "${artifact}.pem" "${artifact}.crt" "${artifact}.cert" "${artifact}.certificate"; do
              if [[ -f "$candidate" ]]; then
                cert_file="$candidate"
                break
              fi
            done

            echo "Verifying $artifact"

            if [[ -n "$RELEASE_TAG" ]]; then
              repo_identity_pattern="${GITHUB_REPOSITORY}"
              if [[ "$GITHUB_REPOSITORY" == "Shree-git/claw-vcs" ]]; then
                repo_identity_pattern="Shree-git/(claw|claw-vcs)"
              fi

              cosign verify-blob \
                --signature "$sig_file" \
                --certificate "$cert_file" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                --certificate-identity-regexp "^https://github.com/${repo_identity_pattern}/.github/workflows/.*@refs/tags/${RELEASE_TAG}$" \
                "$artifact"
            else
              cosign verify-blob \
                --signature "$sig_file" \
                --certificate "$cert_file" \
                "$artifact"
            fi

            ((verified_count+=1))
          done

          echo "Verified ${verified_count} artifact file(s)."
          {
            echo "## Artifact Verification"
            echo ""
            echo "- Verified files: ${verified_count}"
          } >> "$GITHUB_STEP_SUMMARY"
