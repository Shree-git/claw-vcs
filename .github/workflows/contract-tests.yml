name: Contract Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-tests:
    name: Contract test suites
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      RUST_TEST_THREADS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run core library contract tests
        run: cargo test -p claw --locked -- --nocapture

      - name: Run public workflow CLI tests
        run: |
          cargo test -p claw-integration-tests --test cli_admin_git_workflow_tests --locked
          cargo test -p claw-integration-tests --test cli_core_workflow_tests --locked
          cargo test -p claw-integration-tests --test cli_sync_e2e_tests --locked
          cargo test -p claw-integration-tests --test cli_error_contract_tests --locked

      - name: Run contract artifact and interoperability suites
        run: |
          cargo test -p claw-integration-tests --test spec_tests --locked
          cargo test -p claw-integration-tests --test ops_artifacts_tests --locked
          cargo test -p claw-integration-tests --test daemon_http_contract_tests --locked
          cargo test -p claw-integration-tests --test cross_version_runtime_tests --locked
          cargo test -p claw-integration-tests --test load_soak_tests --locked -- --test-threads=1
