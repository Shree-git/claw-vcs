<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" role="img" aria-labelledby="title desc">
  <title id="title">Claw status terminal screenshot</title>
  <desc id="desc">Terminal output showing claw status before snapshotting a demo change.</desc>
  <rect width="880" height="360" rx="8" fill="#101418"/>
  <rect x="0" y="0" width="880" height="42" rx="8" fill="#20262d"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="21" r="6" fill="#28c840"/>
  <text x="96" y="27" fill="#c8d1da" font-family="Menlo, Consolas, monospace" font-size="14">examples/basic-demo</text>
  <g font-family="Menlo, Consolas, monospace" font-size="18">
    <text x="28" y="82" fill="#7ee787">$ claw status</text>
    <text x="28" y="122" fill="#e6edf3">=== On branch demo ===</text>
    <text x="28" y="162" fill="#e6edf3">Changes (1 file(s)):</text>
    <text x="52" y="206" fill="#79c0ff">A</text>
    <text x="92" y="206" fill="#e6edf3">app.conf</text>
    <text x="28" y="270" fill="#8b949e">(use "claw snapshot -m &lt;message&gt;" to record)</text>
  </g>
</svg>
