{{- if not .Values.state.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-%s-state" .Release.Name .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    {{- toYaml .Values.state.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.state.size | quote }}
  {{- if .Values.state.storageClassName }}
  storageClassName: {{ .Values.state.storageClassName | quote }}
  {{- end }}
{{- end }}
